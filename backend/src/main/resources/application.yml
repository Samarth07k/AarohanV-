spring:
  application:
    name: artistlink
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/artistlink}
    username: ${DB_USER:artistlink}
    password: ${DB_PASSWORD:artistlink}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

artistlink:
  jwt:
    # Base64-encoded 256-bit secret. Override in production via env.
    secret: ${JWT_SECRET:c2VjcmV0LWtleS1mb3ItYXJ0aXN0bGluay1kZXYtb25seS1jaGFuZ2UtbWU=}
    access-token-ttl-seconds: ${JWT_ACCESS_TTL:900}        # 15 min
    refresh-token-ttl-seconds: ${JWT_REFRESH_TTL:604800}   # 7 days
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
  media:
    # Local-disk-backed signed URL stub for the media upload flow
    base-url: ${MEDIA_BASE_URL:http://localhost:8080/media-store}
  demo:
    # Demo seed system — dev/demo only. Disable in production via DEMO_SEED=false.
    seed-enabled: ${DEMO_SEED:true}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
